<!-- admin/panels/users.html -->
<div class="users-panel">
    <!-- Header with title and add button -->
    <div class="panel-header">
        <h2><i class="fas fa-users"></i> User Management</h2>
        <button class="btn-primary" id="addUserBtn"><i class="fas fa-plus"></i> Add User</button>
    </div>

    <!-- Filters & Search -->
    <div class="filters-bar">
        <div class="search-wrapper">
            <i class="fas fa-search"></i>
            <input type="text" id="searchUsers" placeholder="Search by name, email or UID..." class="search-input">
        </div>
        <div class="filter-group">
            <select id="statusFilter" class="filter-select">
                <option value="all">All Status</option>
                <option value="active">Active</option>
                <option value="blocked">Blocked</option>
            </select>
            <select id="sortBy" class="filter-select">
                <option value="joined_desc">Newest First</option>
                <option value="joined_asc">Oldest First</option>
                <option value="cashback_desc">Highest Cashback</option>
                <option value="name_asc">Name A-Z</option>
            </select>
        </div>
    </div>

    <!-- Users Table -->
    <div class="table-responsive">
        <table class="data-table users-table">
            <thead>
                <tr>
                    <th>User</th>
                    <th>Email</th>
                    <th>Cashback</th>
                    <th>Joined</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="usersTableBody">
                <tr><td colspan="6" class="loading-placeholder">Loading users...</td></tr>
            </tbody>
        </table>
    </div>

    <!-- Pagination -->
    <div class="pagination-container" id="paginationContainer">
        <button class="page-btn" id="prevPage" disabled><i class="fas fa-chevron-left"></i> Previous</button>
        <span class="page-info" id="pageInfo">Page 1 of 1</span>
        <button class="page-btn" id="nextPage">Next <i class="fas fa-chevron-right"></i></button>
    </div>
</div>

<!-- Edit User Modal -->
<div id="editUserModal" class="modal" style="display: none;">
    <div class="modal-content">
        <div class="modal-header">
            <h3><i class="fas fa-user-edit"></i> Edit User</h3>
            <span class="modal-close">&times;</span>
        </div>
        <div class="modal-body">
            <input type="hidden" id="editUserId">
            <div class="form-group">
                <label>Display Name</label>
                <input type="text" id="editDisplayName" class="form-input">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="editEmail" class="form-input" readonly>
            </div>
            <div class="form-group">
                <label>Cashback Balance ($)</label>
                <input type="number" id="editCashback" class="form-input" step="0.01">
            </div>
            <div class="form-group">
                <label>Status</label>
                <select id="editStatus" class="form-input">
                    <option value="active">Active</option>
                    <option value="blocked">Blocked</option>
                </select>
            </div>
            <div class="form-group">
                <label>Role</label>
                <select id="editRole" class="form-input">
                    <option value="user">User</option>
                    <option value="moderator">Moderator</option>
                    <option value="admin">Admin</option>
                </select>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn-secondary modal-cancel">Cancel</button>
            <button class="btn-primary" id="saveUserChanges">Save Changes</button>
        </div>
    </div>
</div>

<!-- Delete Confirmation Modal -->
<div id="deleteUserModal" class="modal" style="display: none;">
    <div class="modal-content" style="max-width: 400px;">
        <div class="modal-header">
            <h3><i class="fas fa-exclamation-triangle"></i> Delete User</h3>
            <span class="modal-close">&times;</span>
        </div>
        <div class="modal-body">
            <p>Are you sure you want to delete <strong id="deleteUserName"></strong>?</p>
            <p class="text-danger">This action cannot be undone. All user data (cashback, referrals, clicks) will be permanently removed.</p>
        </div>
        <div class="modal-footer">
            <button class="btn-secondary modal-cancel">Cancel</button>
            <button class="btn-danger" id="confirmDeleteBtn">Delete Permanently</button>
        </div>
    </div>
</div>

<!-- Add User Modal (simple) -->
<div id="addUserModal" class="modal" style="display: none;">
    <div class="modal-content">
        <div class="modal-header">
            <h3><i class="fas fa-user-plus"></i> Add New User</h3>
            <span class="modal-close">&times;</span>
        </div>
        <div class="modal-body">
            <div class="form-group">
                <label>Email *</label>
                <input type="email" id="addUserEmail" class="form-input" required>
            </div>
            <div class="form-group">
                <label>Password *</label>
                <input type="password" id="addUserPassword" class="form-input" required>
            </div>
            <div class="form-group">
                <label>Display Name</label>
                <input type="text" id="addUserDisplayName" class="form-input">
            </div>
            <div class="form-group">
                <label>Initial Cashback ($)</label>
                <input type="number" id="addUserCashback" class="form-input" step="0.01" value="0">
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn-secondary modal-cancel">Cancel</button>
            <button class="btn-primary" id="createUserBtn">Create User</button>
        </div>
    </div>
</div>

<script>
    // Basic modal handling and UI placeholders
    (function() {
        // Helper to open modal
        function openModal(modalId) {
            const modal = document.getElementById(modalId);
            if (modal) modal.style.display = 'flex';
        }
        function closeModal(modalId) {
            const modal = document.getElementById(modalId);
            if (modal) modal.style.display = 'none';
        }
        function closeAllModals() {
            document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
        }

        // Attach close buttons
        document.querySelectorAll('.modal-close, .modal-cancel').forEach(btn => {
            btn.addEventListener('click', () => {
                const modal = btn.closest('.modal');
                if (modal) modal.style.display = 'none';
            });
        });
        // Click outside to close
        window.addEventListener('click', (e) => {
            if (e.target.classList.contains('modal')) {
                e.target.style.display = 'none';
            }
        });

        // Add User button
        const addBtn = document.getElementById('addUserBtn');
        if (addBtn) {
            addBtn.addEventListener('click', () => openModal('addUserModal'));
        }

        // Placeholder for edit/delete actions (will be wired by users.js)
        window.editUser = function(userId) {
            console.log('Edit user', userId);
            openModal('editUserModal');
        };
        window.deleteUser = function(userId, userName) {
            document.getElementById('deleteUserName').innerText = userName;
            document.getElementById('confirmDeleteBtn').dataset.userId = userId;
            openModal('deleteUserModal');
        };

        // Notify that users.html is ready
        if (typeof window.dispatchEvent === 'function') {
            window.dispatchEvent(new CustomEvent('usersPanelReady'));
        }
    })();
</script>
